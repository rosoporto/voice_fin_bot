name: Check Code Telegram Bot

on:
  push:
    branches:
      - master

jobs:
  # ЭТАП 1: Проверка кода
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Укажить версию Python бота

      - name: Install linter
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run syntax check
        # Проверяет только критические ошибки синтаксиса и неопределенные имена
        run: ruff check --select E9,F63,F7,F82 .
